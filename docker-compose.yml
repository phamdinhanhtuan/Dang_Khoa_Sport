version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/dang-khoa-sport
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET} # Should be passed from host .env
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - mongo
      - redis
    restart: always

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017" # Optional: expose to host for debugging
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

volumes:
  mongo-data:
